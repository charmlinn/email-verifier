<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email Verifier Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="heading">
          <p class="eyebrow">Email Verifier</p>
          <h1>API 调用测试</h1>
        </div>

        <form id="verify-form" class="form">
          <label for="email">Email</label>
          <div class="field-row">
            <input id="email" name="email" type="text" value="test@gmail.com" autocomplete="email" required />
            <button type="submit">验证</button>
          </div>

          <fieldset class="options">
            <legend>验证参数</legend>
            <label class="check-option">
              <input id="smtp" name="smtp" type="checkbox" />
              <span>开启 SMTP 验证</span>
            </label>
            <label class="check-option">
              <input id="catchAll" name="catchAll" type="checkbox" checked />
              <span>检测 catch-all</span>
            </label>
            <label class="check-option">
              <input id="suggest" name="suggest" type="checkbox" checked />
              <span>域名拼写建议</span>
            </label>
            <label class="check-option">
              <input id="gravatar" name="gravatar" type="checkbox" />
              <span>检测 Gravatar</span>
            </label>
            <label class="check-option">
              <input id="yahooApi" name="yahooApi" type="checkbox" />
              <span>Yahoo API 验证</span>
            </label>

            <div class="option-fields">
              <label>
                From Email
                <input id="fromEmail" name="fromEmail" type="text" value="user@example.org" />
              </label>
              <label>
                Hello Name
                <input id="helloName" name="helloName" type="text" value="localhost" />
              </label>
              <label>
                Connect Timeout
                <input id="connectTimeout" name="connectTimeout" type="text" value="10s" />
              </label>
              <label>
                Operation Timeout
                <input id="operationTimeout" name="operationTimeout" type="text" value="10s" />
              </label>
              <label class="wide-field">
                SOCKS Proxy
                <input id="proxy" name="proxy" type="text" placeholder="socks5://user:password@127.0.0.1:1080?timeout=5s" />
              </label>
            </div>
          </fieldset>
        </form>

        <div class="quick-row" aria-label="快速测试">
          <button type="button" data-email="support@archybase.com">业务邮箱</button>
          <button type="button" data-email="test@gmail.com">Gmail</button>
          <button type="button" data-email="hello@gmai.com">拼写建议</button>
          <button type="button" data-email="not-an-email">无效格式</button>
        </div>

        <section class="result-panel" aria-live="polite">
          <div class="result-header">
            <span id="status-pill" class="pill">待测试</span>
            <span id="request-path" class="path">GET /v1/{email}/verification</span>
          </div>
          <div class="result-grid">
            <article class="result-column">
              <h2>原始返回</h2>
              <pre id="original-result">输入邮箱后点击验证。</pre>
            </article>
            <article class="result-column">
              <h2>映射结果</h2>
              <pre id="mapped-result">等待映射结果。</pre>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
