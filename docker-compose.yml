services:
  api:
    build:
      context: .
    image: email-verifier-api:local
    container_name: email-verifier-api
    environment:
      PORT: "9090"
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  demo:
    image: node:22-alpine
    container_name: email-verifier-demo
    working_dir: /app
    environment:
      PORT: "3000"
      API_BASE_URL: "http://api:9090"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./demo:/app:ro
    command: ["node", "server.js"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
